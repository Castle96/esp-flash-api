# Runs on the big machine (64GB RAM, Ollama host)
# Starts STT service (port 8001) and TTS service (port 8002)
# Ollama runs separately on port 11434

services:
  stt:
    build: ./stt
    container_name: diva-stt
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./stt/.env
    volumes:
      - whisper_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tts:
    build: ./tts
    container_name: diva-tts
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ./tts/.env
    volumes:
      - kokoro_models:/app/models
      - tts_voices:/voices
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  wakeword:
    build: ./wakeword
    container_name: diva-wakeword
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - ./wakeword/.env
    volumes:
      - wakeword_data:/data/custom_wakewords
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whisper_cache:
  kokoro_models:
  tts_voices:
  wakeword_data:
